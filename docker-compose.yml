services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-demo
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: node-backend
    restart: always
    environment:
      - DB_SERVER=sqlserver
      - DB_NAME=DemoDB
      - DB_USER=SA
      - DB_PASSWORD=${SA_PASSWORD}
      - PORT=3000
    depends_on:
      - sqlserver
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nginx-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  sqlserver-data:
    driver: local

networks:
  app-network:
    driver: bridge
